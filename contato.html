    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favico.png" type="image/png" />
    <title>Contato</title>
  </head>
  <body>
    <header class="main-header">
      <a class="logo" href="index.html" title="Voltar para a página inicial">
        <img
          class="img-mobile"
          src="img/Bussola-jornada-branca.png"
          alt="Bussola do Logo da Jornada Viagens na cor Branca"
        />
        <img
          class="img-desktop"
          src="img/Bussola-jornada-texto-branca.png"
          alt="Logo da Jornada Viagens na cor branca"

      <div class="navigation-menu">

        <input type="checkbox" id="menu" hidden />

        <nav>
          <ul class="list-links">

            <li>

                href="contato.html"

                >Contato</a
              >
            </li>

        </nav>
      </div>
    </header>

    <section class="contact hero">
      <div class="hero-img">
        <div class="hero-content">
          <h1>Entre em contato!</h1>
          <hr />
          <p class="content-text">
            Dúvidas, sugestões, problemas para resolver? Temos uma equipe de

          </p>
        </div>
      </div>
    </section>
